<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: hsl(var(--background)); font-family: var(--font-sans); display: flex; gap: 20px; align-items: center; }
  .box { display: flex; align-items: center; justify-content: center; background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); border-radius: var(--radius-md); font-size: 14px; font-weight: 600; }
  .cap { font-size: 12px; color: hsl(var(--muted-foreground)); margin-top: 8px; text-align: center; }
  .item { text-align: center; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="height:44px;padding:0 20px">Mínimo</div><div class="cap">touch-min · 44px</div></div>
  <div class="item"><div class="box" style="height:48px;padding:0 24px">Ação primária</div><div class="cap">touch-comfort · 48px</div></div>
</body>
</html>
