<!-- @dsCard group="Spacing" viewport="700x150" name="Escala de espaçamento" subtitle="base 4px" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: hsl(var(--background)); font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 12px; padding: 3px 0; }
  .bar { height: 14px; background: hsl(var(--primary)); border-radius: 3px; }
  .lbl { font-size: 12px; color: hsl(var(--muted-foreground)); width: 120px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row"><div class="lbl">space-1 · 4px</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="lbl">space-2 · 8px</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="lbl">space-4 · 16px</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="lbl">space-6 · 24px</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="lbl">space-8 · 32px</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="lbl">space-12 · 48px</div><div class="bar" style="width:48px"></div></div>
</body>
</html>
