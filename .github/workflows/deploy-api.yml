name: Deploy API

# Deploy da API (NestJS) no Google Cloud Run, no push para main quando a API ou
# os tipos mudam. Autentica via Workload Identity (OIDC, sem chave de longa
# duração), builda a imagem (amd64) no runner, faz push no Artifact Registry e
# faz o deploy — o Cloud Run cria uma nova revisão mantendo env/secrets/config.
on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/types/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch: {}

# Necessário para o OIDC (Workload Identity Federation).
permissions:
  id-token: write
  contents: read

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCP_REGION: us-east1
  SERVICE: floreei-api
  IMAGE: us-east1-docker.pkg.dev/${{ vars.GCP_PROJECT }}/floreei/floreei-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Fica inerte até você habilitar: defina a variável de repositório
    # DEPLOY_API_ENABLED=true. Enquanto ausente, o job é pulado (não falha).
    if: ${{ vars.DEPLOY_API_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Autenticar no GCP (Workload Identity, sem chave)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Login do Docker no Artifact Registry
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      # Runner ubuntu é amd64 nativo (bate com o Cloud Run) — sem emulação.
      - name: Build da imagem
        run: docker build -f apps/api/Dockerfile -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .

      - name: Push no Artifact Registry
        run: |
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      # Deploy só com --image: o Cloud Run mantém env vars, secrets, CPU/mem,
      # scaling e ingress da revisão atual, trocando apenas a imagem.
      - name: Deploy no Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE:${{ github.sha }}" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT" \
            --quiet
