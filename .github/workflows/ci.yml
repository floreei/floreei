name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela runs antigos do mesmo branch/PR quando chega um novo push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Qualidade estática + testes unitários com cobertura + build de tudo.
  # Não precisa de banco, então roda em paralelo com o e2e.
  checks:
    name: Lint · Types · Unit · Build
    runs-on: ubuntu-latest

    env:
      # Config do Firebase vem das Variables do repositório (Settings → Secrets
      # and variables → Actions → Variables): o Next inlina as NEXT_PUBLIC_* no
      # build e admin/web pré-renderizam páginas que inicializam o Firebase —
      # sem elas o build quebra com auth/invalid-api-key (igual à Vercel/prod).
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @sistema-flores/types build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests + coverage
        run: pnpm test:coverage

      - name: Build all apps
        run: pnpm build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            packages/types/coverage
            apps/web/coverage
            apps/api/coverage
          if-no-files-found: ignore
          retention-days: 14

  # Testes de integração/e2e da API — sobem Postgres e batem no Firebase real.
  e2e:
    name: API e2e
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flores
          POSTGRES_PASSWORD: flores
          POSTGRES_DB: sistema_flores_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U flores -d sistema_flores_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      TEST_DATABASE_HOST: localhost
      TEST_DATABASE_PORT: 5433
      TEST_DATABASE_USER: flores
      TEST_DATABASE_PASSWORD: flores
      TEST_DATABASE_NAME: sistema_flores_test
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      # Config pública do Firebase (não é segredo) — o e2e usa o Firebase real.
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      FIREBASE_API_KEY: ${{ vars.FIREBASE_API_KEY }}
      # Higiene do Firebase real: cada usuário criado pelos testes se
      # auto-deleta no teardown (senão acumulam milhares de contas de teste).
      E2E_CLEANUP_USERS: "1"

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @sistema-flores/types build

      - name: E2E API tests
        run: pnpm --filter @sistema-flores/api test:e2e

  # Vulnerabilidades em dependências. `high` é informativo; `critical` bloqueia.
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit (high, tudo — informativo)
        continue-on-error: true
        run: pnpm audit --audit-level=high
      # Bloqueia só o que vai para produção (dev-only, ex.: vitest UI, não sobe).
      # O Dependabot cuida das demais atualizações.
      - name: Audit (critical em produção — bloqueia)
        run: pnpm audit --prod --audit-level=critical
