<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: hsl(var(--background)); }
  .row { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; padding: 6px 0; }
  .spec { font-family: var(--font-serif); font-optical-sizing: auto; font-variation-settings: 'SOFT' 40; letter-spacing: -0.02em; line-height: 1.15; color: hsl(var(--foreground)); }
  .meta { font-family: var(--font-sans); font-size: 11px; color: hsl(var(--muted-foreground)); white-space: nowrap; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row"><div class="spec" style="font-size:52px;font-weight:600">Sistema Flores</div><div class="meta">5xl · 52px · 600</div></div>
  <div class="row"><div class="spec" style="font-size:32px;font-weight:600">Novo orçamento</div><div class="meta">3xl · 32px · PageHeader</div></div>
  <div class="row"><div class="spec" style="font-size:24px;font-weight:500">Resumo do evento</div><div class="meta">2xl · 24px · 500</div></div>
</body>
</html>
