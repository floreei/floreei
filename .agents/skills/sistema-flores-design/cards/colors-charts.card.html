<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: hsl(var(--background)); font-family: var(--font-sans); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; text-align: center; }
  .chip { height: 56px; border-radius: var(--radius-md); box-shadow: var(--shadow-card); }
  .name { font-size: 12px; color: hsl(var(--muted-foreground)); margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:hsl(var(--chart-1))"></div><div class="name">chart-1 · verde</div></div>
    <div class="sw"><div class="chip" style="background:hsl(var(--chart-2))"></div><div class="name">chart-2 · argila</div></div>
    <div class="sw"><div class="chip" style="background:hsl(var(--chart-3))"></div><div class="name">chart-3 · petróleo</div></div>
    <div class="sw"><div class="chip" style="background:hsl(var(--chart-4))"></div><div class="name">chart-4 · âmbar</div></div>
    <div class="sw"><div class="chip" style="background:hsl(var(--chart-5))"></div><div class="name">chart-5 · lilás</div></div>
  </div>
</body>
</html>
